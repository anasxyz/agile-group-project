<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Summary</title>
</head>

<body>

    <div class="ncr-bank">NCR BANK</div>

    <div class="container">
        <h1>Balance Summary</h1>
        <div class="row">
            <span>FROM</span>
            <span class="value">Checking</span>
        </div>
        <div class="row">
            <span>AVAILABLE BALANCE</span>
            <span class="value">$1,111.11</span>
        </div>
        <div class="row">
            <span>CURRENT BALANCE</span>
            <span class="value">$2,222.22</span>
        </div>
        <div class="row">
            <span>ACCOUNT BALANCE</span>
            <span class="value">$3,333.33</span>
        </div>
        <div class="footer">
            <button class="done-button" onclick="window.location.href='/'">DONE</button>
        </div>
    </div>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 800px;
            padding: 20px;
            border: 2px solid #000;
            border-radius: 10px;
            background-color: #ffffff;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            width: 100%;
        }

        .row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px 0;
            font-size: 18px;
            border-bottom: 1px solid #ddd;
        }

        .row:last-child {
            border-bottom: none;
        }

        .row span {
            font-size: 18px;
        }

        .row span.value {
            font-weight: bold;
        }

        .footer {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .done-button {
            width: 200px;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 5px;
        }

        .done-button:hover {
            background-color: #d9d9d9;
        }


        .ncr-bank {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #000;
        }
    </style>
</body>

</html>
