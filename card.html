<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert Debit Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            margin: 0;
        }

        .debit-card {
            width: 90%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #1a73e8, #4285f4);
            border-radius: 15px;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            color: white;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
        }

        .debit-card .chip {
            width: 50px;
            height: 35px;
            background: gold;
            border-radius: 5px;
            margin-bottom: 10px;
            align-self: flex-start;
        }

        .debit-card .card-number {
            font-size: 3rem;
            letter-spacing: 3px;
            margin-top: 10px;
        }

        .debit-card .card-holder {
            margin-top: 20px;
            font-size: 2rem;
        }

        .debit-card .bank-logo {
            align-self: flex-end;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="debit-card" onclick="pinEntry()">
        <div class="chip"></div>
        <div class="card-number">1234 5678 9012 3456</div>
        <div class="card-holder">A G YOUSSEF</div>
        <div class="bank-logo">NCR Bank</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function pinEntry() {
            window.location.href = "keypad.html";
        }
    </script>
</body>

</html>
