<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Withdrawal</title>
</head>

<body>

    <div class="ncr-bank">NCR BANK</div>

    <div class="container">
        <h1>Cash Withdrawal</h1>
        <form action="/withdraw" method="post">
            <div class="button-container">
                <button type="submit" name="account-type" value="checking" class="large-button"
                    onclick="selectAccount('Checking')">Checking</button>
                <button type="submit" name="account-type" value="savings" class="large-button"
                    onclick="selectAccount('Savings')">Savings</button>
                <button type="submit" name="account-type" value="credit" class="large-button"
                    onclick="selectAccount('Credit')">Credit</button>
                <button type="submit" name="account-type" value="loan" class="large-button"
                    onclick="selectAccount('Loan')">Loan</button>
            </div>
            <div class="small-button-container">
                <button type="button" class="small-button" onclick="window.location.href='/continue'">Continue</button>
                <button type="button" class="small-button" onclick="window.location.href='/exit'">Exit</button>
            </div>
        </form>
    </div>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 800px;
            padding: 20px;
            border: 2px solid #000;
            border-radius: 10px;
            background-color: #f0f0f0;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.4);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .button-container {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .large-button {
            width: 100%;
            padding: 20px;
            font-size: 18px;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            background-color: #fff;
            border: 2px solid #000;
            border-radius: 5px;
        }

        .large-button:hover {
            background-color: #d9d9d9;
        }

        .small-button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            width: 100%;
        }

        .small-button {
            width: 48%;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            background-color: #fff;
            border: 2px solid #000;
            border-radius: 5px;
        }

        .small-button:hover {
            background-color: #d9d9d9;
        }

        .ncr-bank {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #000;
        }
    </style>

    <script>
        function selectAccount(accountType) {
            alert('You selected ' + accountType);
        }
    </script>
</body>

</html>
