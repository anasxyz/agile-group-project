<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Cash</title>
</head>

<body>
    <div class="container">
        <h1>Fast Cash</h1>
        <form action="/withdraw" method="post">
            <div class="button-container">
                <button type="submit" name="amount" value="40" class="large-button"
                    onclick="selectAmount(40)">$40</button>
                <button type="submit" name="amount" value="50" class="large-button"
                    onclick="selectAmount(50)">$50</button>
                <button type="submit" name="amount" value="60" class="large-button"
                    onclick="selectAmount(60)">$60</button>
                <button type="button" class="large-button" onclick="enterOtherAmount()">Other Amount</button>
                <div class="small-button-container">
                    <button type="button" class="small-button"
                        onclick="window.location.href='/continue'">Continue</button>
                    <button type="button" class="small-button" onclick="window.location.href='/exit'">Exit</button>
                </div>
            </div>
        </form>
    </div>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 20px 20px 20px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .button-container {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .large-button {
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            font-size: 18px;
            cursor: pointer;
            background-color: #76adae;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .large-button:hover {
            background-color: #0056b3;
        }

        .small-button-container {
            display: flex;
            justify-content: space-between;
        }

        .small-button {
            width: 48%;
            padding: 10px;
            margin: 5px 1%;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .small-button:hover {
            background-color: #0056b3;
        }
    </style>

    <script>
        function selectAmount(amount) {
            alert('You selected $' + amount);
        }

        function enterOtherAmount() {
            var amount = prompt("Please enter the amount:");
            if (amount != null && amount != "") {
                var form = document.createElement("form");
                form.setAttribute("method", "post");
                form.setAttribute("action", "/withdraw");

                var hiddenField = document.createElement("input");
                hiddenField.setAttribute("type", "hidden");
                hiddenField.setAttribute("name", "amount");
                hiddenField.setAttribute("value", amount);

                form.appendChild(hiddenField);
                document.body.appendChild(form);
                form.submit();
            }
        }
    </script>
</body>

</html>
