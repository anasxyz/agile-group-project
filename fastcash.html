<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Cash</title>
</head>

<body>

    <div class="ncr-bank">NCR BANK</div>

    <div class="container">
        <h1>Fast Cash</h1>
        <form action="/withdraw" method="post">
            <div class="button-container">
                <button type="submit" name="amount" value="40" onclick="selectAmount(40)">$40</button>
                <button type="submit" name="amount" value="50" onclick="selectAmount(50)">$50</button>
                <button type="submit" name="amount" value="60" onclick="selectAmount(60)">$60</button>
                <button type="button" onclick="enterOtherAmount()">Other Amount</button>
            </div>
            <div class="small-button-container">
                <button type="button" class="small-button" onclick="window.location.href='/continue'">Continue</button>
                <button type="button" class="small-button" onclick="window.location.href='/exit'">Exit</button>
            </div>
        </form>
    </div>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 800px;
            padding: 20px;
            border: 2px solid #000;
            border-radius: 10px;
            background-color: #f0f0f0;
            text-align: center;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.4);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .button-container {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            background-color: #fff;
            border: 2px solid #000;
            border-radius: 5px;
            transition: background-color 0.3s;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.4);
        }

        button:hover {
            background-color: #d9d9d9;
        }

        .small-button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .small-button {
            width: 48%;
        }

        .ncr-bank {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #000;
        }
    </style>

    <script>
        function selectAmount(amount) {
            alert('You selected $' + amount);
        }

        function enterOtherAmount() {
            const amount = prompt("Please enter the amount:");
            if (amount) {
                const form = document.createElement("form");
                form.method = "post";
                form.action = "/withdraw";

                const hiddenField = document.createElement("input");
                hiddenField.type = "hidden";
                hiddenField.name = "amount";
                hiddenField.value = amount;

                form.appendChild(hiddenField);
                document.body.appendChild(form);
                form.submit();
            }
        }
    </script>
</body>

</html>
