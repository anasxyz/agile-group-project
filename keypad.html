<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTER PIN</title>

</head>

<body>

    <div class="ncr-bank">NCR BANK</div>

    <div class="pin-screen">
        <h1>Enter PIN</h1>
        <input type="password" class="pin-value" readonly>
        <div class="pin-keyboard">
            <button class="pin-keyboard-key">1</button>
            <button class="pin-keyboard-key">2</button>
            <button class="pin-keyboard-key">3</button>
            <button class="pin-keyboard-key">4</button>
            <button class="pin-keyboard-key">5</button>
            <button class="pin-keyboard-key">6</button>
            <button class="pin-keyboard-key">7</button>
            <button class="pin-keyboard-key">8</button>
            <button class="pin-keyboard-key">9</button>
            <button class="pin-keyboard-key pin-keyboard-key--clear">Exit</button>
            <button class="pin-keyboard-key">0</button>
            <button class="pin-keyboard-key pin-keyboard-key--enter"
                onclick="window.location.href='transaction.html'">&#8594;</button>
        </div>
    </div>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .pin-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 600px;
            padding: 20px;
            border: 10px solid #000;
            border-radius: 15px;
            background-color: #fff;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.7);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .pin-value {
            width: 63%;
            padding: 10px;
            font-size: 32px;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid #000;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .pin-keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 400px;
        }

        .pin-keyboard-key {
            height: 60px;
            font-size: 30px;
            border: 2px solid #000;
            border-radius: 5px;
            background-color: #fff;
            cursor: pointer;
            text-align: center;
            line-height: 60px;
        }

        .pin-keyboard-key:hover {
            background-color: #d9d9d9;
        }

        .pin-keyboard-key--clear {
            background-color: #f8d7da;
        }

        .pin-keyboard-key--clear:hover {
            background-color: #f1b0b7;
        }

        .pin-keyboard-key--enter {
            background-color: #d4edda;
        }

        .pin-keyboard-key--enter:hover {
            background-color: #c3e6cb;
        }

        .ncr-bank {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #000;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const input = document.querySelector(".pin-value");
            const keys = document.querySelectorAll(".pin-keyboard-key");

            keys.forEach(key => {
                key.addEventListener("click", () => {
                    const value = key.textContent.trim();

                    if (key.classList.contains("pin-keyboard-key--clear")) {
                        input.value = "";
                    } else if (key.classList.contains("pin-keyboard-key--enter")) {
                        if (input.value) {
                            alert(`Entered PIN: ${input.value}`);
                            input.value = "";
                        }
                    } else {
                        input.value += value;
                    }
                });
            });
        });
    </script>
</body>

</html>
