<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTER PIN</title>
    <script type="module" src="main.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #edf1f0;
        }

        .pin-screen {
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 16px;
            gap: 16px;
            border-radius: 8px;
            width: 300px;
            background: #ffffff;
        }

        .pin-value {
            outline: none;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 32px;
            letter-spacing: 4px;
        }

        .pin-divider {
            height: 1px;
            width: 100%;
            border: none;
            background: #0095779f;
            margin: 0;
        }

        .pin-keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .pin-keyboard-key {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            cursor: pointer;
            font-family: 'Lexend', sans-serif;
            font-size: 22px;
            color: #555555;
            background: #ffffff;
            border: 2px solid #eeeeee;
            border-radius: 4px;
        }

        .pin-keyboard-key:active {
            background: #eeeeee;
        }
    </style>
</head>

<body>
    <div id="mainPinScreen" class="pin-screen">
        <input type="password" class="pin-value" readonly>
        <hr class="pin-divider">
        <div class="pin-keyboard">
            <button type="button" class="pin-keyboard-key">1</button>
            <button type="button" class="pin-keyboard-key">2</button>
            <button type="button" class="pin-keyboard-key">3</button>
            <button type="button" class="pin-keyboard-key">4</button>
            <button type="button" class="pin-keyboard-key">5</button>
            <button type="button" class="pin-keyboard-key">6</button>
            <button type="button" class="pin-keyboard-key">7</button>
            <button type="button" class="pin-keyboard-key">8</button>
            <button type="button" class="pin-keyboard-key">9</button>
            <button type="button" class="pin-keyboard-key pin-keyboard-key--clear">Exit</button>
            <button type="button" class="pin-keyboard-key">0</button>
            <button type="button" class="pin-keyboard-key pin-keyboard-key--enter">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-arrow-right">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button></button>
        </div>
    </div>

    <script>
        const initPinScreen = (selector, onEnter) => {
            const container = document.querySelector(selector);
            const input = container.querySelector(".pin-value");
            const keys = container.querySelectorAll(".pin-keyboard-key");

            const clear = () => {
                input.value = "";
            };

            for (const key of keys) {
                key.addEventListener("click", () => {
                    const value = key.textContent.trim();

                    if (key.classList.contains("pin-keyboard-key--clear")) {
                        clear();
                    } else if (key.classList.contains("pin-keyboard-key--enter")) {
                        input.value && onEnter && onEnter(input.value, clear);
                    } else {
                        input.value += value;
                    }
                });
            }
        };

        initPinScreen("#mainPinScreen", (pin, clear) => {
            console.log(`Entered Pin: ${pin}`);
            clear();
        });
    </script>
</body>

</html>
