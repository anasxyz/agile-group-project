<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINT RECEIPT</title>
</head>

<body>
    <div class="container">
        <h1>Do you want a receipt?</h1>
        <div class="button-container">
            <button type="button" class="large-button" onclick="window.location.href='/'">NO</button>
            <button type="button" class="large-button" onclick="window.location.href='/'">YES</button>
        </div>
        <div class="small-button-container">
            <button type="button" class="small-button" onclick="window.location.href='transaction.html'">MENU</button>
            <button type="button" class="small-button" onclick="window.close()">EXIT</button>
        </div>
    </div>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 800px;
            padding: 20px;
            border: 2px solid #000;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.7);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            gap: 10px;
        }

        .large-button {
            width: 48%;
            padding: 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 5px;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.7);
        }

        .large-button:hover {
            background-color: #d9d9d9;
        }

        .small-button-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .small-button {
            width: 48%;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 5px;
        }

        .small-button:hover {
            background-color: #d9d9d9;
        }
    </style>
</body>

</html>
