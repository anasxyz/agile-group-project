<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIEW BALANCE</title>
</head>

<body>

    <div class="ncr-bank">NCR BANK</div>

    <div class="container">
        <h1>How would you like your balance?</h1>
        <div class="button-container">
            <button type="button" class="large-button" onclick="window.location.href='balance_summary.html'">VIEW
                BALANCE</button>
            <button type="button" class="large-button" onclick="window.location.href='balance_summary.html'">PRINT
                BALANCE</button>
        </div>
        <div class="small-button-container">
            <button type="button" class="small-button" onclick="window.location.href='transaction.html'">MENU</button>
            <button type="button" class="small-button" onclick="window.close()">EXIT</button>
        </div>
    </div>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            text-align: center;
            width: 800px;
            padding: 20px;
            border: 10px solid #000;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.4);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .large-button {
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 5px;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.4);
        }

        .large-button:hover {
            background-color: #d9d9d9;
        }

        .small-button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .small-button {
            width: 48%;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 5px;
        }

        .small-button:hover {
            background-color: #d9d9d9;
        }

        .ncr-bank {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #000;
        }
    </style>
</body>

</html>
