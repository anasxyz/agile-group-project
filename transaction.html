<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRANSACTION TYPE MENU</title>
</head>

<body>
    <div class="ncr-bank">NCR BANK</div>

    <div class="transaction-options">
        <button onclick="window.location.href='balanceinquiry.html'">Balance Inquiry</button>
        <button onclick="window.location.href='cashwithdrawal.html'">Cash Withdrawal</button>
        <button onclick="showNotAvailable()">Deposits</button>
        <button onclick="showNotAvailable()">Payments</button>
        <button onclick="showNotAvailable()">Mixed Deposit</button>
        <button onclick="showNotAvailable()">Cash a Check</button>
        <button onclick="showNotAvailable()">Check Deposit with CashBack</button>
        <button onclick="exit()">Exit</button>
    </div>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .transaction-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            border: 2px solid #000;
            border-radius: 10px;
            background-color: #f0f0f0;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.4);
        }

        .transaction-options button {
            padding: 20px;
            width: 800px;
            font-size: 18px;
            cursor: pointer;
        }

        .ncr-bank {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #000;
        }
    </style>

    <script>
        function showNotAvailable() {
            alert("This feature is currently not available");
        }
    </script>
</body>

</html>
